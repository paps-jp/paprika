# Paprika multi-hub edge — sticky worker WS + round-robin API.
#
# STATUS: foundation / NOT ENABLED. Safe to deploy only AFTER the
# Hub→Hub forwarding layer (control-plane phase 3) and shared object
# storage (phase 2 / MinIO) land. Until then, running >1 hub splits
# session ownership and asset storage across replicas and breaks
# cross-hub sessions. See deploy/scale/README.md.
#
# Routing model (see internal/200-worker-target-architecture.html §4):
#   /workers/{id}/link  -> sticky by worker_id (consistent hash)
#   /sessions/*         -> round-robin
#   /jobs/*             -> round-robin
#   everything else     -> round-robin

worker_processes auto;
events { worker_connections 4096; }

http {
    # WebSocket upgrade plumbing: map sets Connection: upgrade only for
    # actual WS handshakes, "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # The three hub replicas, addressed explicitly so the sticky hash is
    # deterministic. Add/remove servers to scale hubs.
    # Round-robin pool — for /sessions, /jobs, static, default.
    upstream hubs {
        server hub-a:8000 max_fails=3 fail_timeout=10s;
        server hub-b:8000 max_fails=3 fail_timeout=10s;
        server hub-c:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # Sticky pool — SAME servers, but worker control WebSockets are
    # pinned by worker_id with consistent hashing so a given worker
    # always reconnects to the same hub (deterministic WS ownership).
    # Consistent (vs plain) hashing means losing one hub re-homes only
    # ~1/N of workers instead of reshuffling the whole fleet.
    upstream hubs_sticky {
        hash $worker_id consistent;
        server hub-a:8000 max_fails=3 fail_timeout=10s;
        server hub-b:8000 max_fails=3 fail_timeout=10s;
        server hub-c:8000 max_fails=3 fail_timeout=10s;
    }

    # Long timeouts for the persistent worker control channel. Must be
    # comfortably larger than the hub↔worker ping_interval (30s) /
    # ping_timeout (120s) so nginx never severs an idle-but-healthy WS
    # and triggers a spurious 1011 keepalive-timeout close.
    proxy_read_timeout  330s;
    proxy_send_timeout  330s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Body size cap. nginx defaults to 1 MB, which rejects worker asset
    # uploads (POST /jobs/{id}/assets) over that size with 413 and
    # stalls the job for 30+ min until the worker disconnects. 2 GB is
    # generous but safe (worker-side min-size filter + dedupe already
    # gate what gets uploaded).
    client_max_body_size 2g;

    server {
        listen 8000;

        # Worker control WebSocket — sticky by the {worker_id} path
        # segment. The named capture $worker_id feeds the upstream hash.
        location ~ ^/workers/(?<worker_id>[^/]+)/link/?$ {
            proxy_pass http://hubs_sticky;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Everything else (HTTP API + any other WS like job event
        # streams) — round-robin. The Hub→Hub forwarding layer (phase 3)
        # makes the cross-hub HTTP session surface correct: actions,
        # close, status AND noVNC (HTTP viewer assets + the websockify
        # WS bridge) all forward to the owning hub when they land
        # elsewhere. See deploy/scale/README.md.
        location / {
            proxy_pass http://hubs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
