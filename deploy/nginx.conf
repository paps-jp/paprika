# Paprika edge nginx — used by the root docker-compose.yml as the
# public front for the hub fleet. Multi-hub-capable; **currently
# configured for a single hub (hub-a)**. To scale to N hubs:
#
#   1. Add hub-b / hub-c services to docker-compose.yml (copy the
#      hub-a block, change HUB_ID and the debug port).
#   2. Add matching `server hub-b:8000 ...` lines to BOTH the
#      `hubs` and `hubs_sticky` upstreams below.
#   3. `docker compose up -d --build` — nginx reloads its config.
#
# Routing model (full doc: internal/200-worker-target-architecture.html §4):
#   /workers/{id}/link  -> sticky by worker_id (consistent hash)
#   everything else     -> round-robin
#
# The Hub→Hub forwarding layer (server/hub/routes/sessions.py) makes
# this safe under round-robin: a /sessions/{id}/* request that lands
# on a non-owner hub reverse-proxies to the owning hub transparently.

worker_processes auto;
events { worker_connections 4096; }

http {
    # WebSocket upgrade plumbing: map sets Connection: upgrade only for
    # actual WS handshakes, "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Hub replicas. Add lines here when scaling out (see header).
    upstream hubs {
        server hub-a:8000 max_fails=3 fail_timeout=10s;
        # server hub-b:8000 max_fails=3 fail_timeout=10s;
        # server hub-c:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # Sticky pool — SAME servers, but worker control WebSockets are
    # pinned by worker_id with consistent hashing so a given worker
    # always reconnects to the same hub (deterministic WS ownership).
    # Consistent (vs plain) hashing means losing one hub re-homes only
    # ~1/N of workers instead of reshuffling the whole fleet.
    upstream hubs_sticky {
        hash $worker_id consistent;
        server hub-a:8000 max_fails=3 fail_timeout=10s;
        # server hub-b:8000 max_fails=3 fail_timeout=10s;
        # server hub-c:8000 max_fails=3 fail_timeout=10s;
    }

    # Long timeouts for the persistent worker control channel. Must be
    # comfortably larger than the hub<->worker ping_interval (30s) /
    # ping_timeout (120s) so nginx never severs an idle-but-healthy WS
    # and triggers a spurious 1011 keepalive-timeout close.
    proxy_read_timeout  330s;
    proxy_send_timeout  330s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Body size cap. nginx defaults to 1 MB, which rejects worker asset
    # uploads (POST /jobs/{id}/assets) over that size with 413. The
    # worker then keeps retrying / hangs holding the job, leaving the
    # whole job "running" for tens of minutes (real case that drove
    # this fix: a 4-GIF page (~1.3 MB each) took 34 min because the
    # worker held the job hoping the failed uploads would succeed,
    # then disconnected and the hub orphan-settled it as completed).
    # 2 GB is generous but safe -- the worker pipeline already filters
    # by min-size + dedupes, so an oversized body is genuinely
    # something the operator wants persisted.
    client_max_body_size 2g;

    server {
        listen 8000;

        # Worker control WebSocket — sticky by the {worker_id} path
        # segment. The named capture $worker_id feeds the upstream hash.
        location ~ ^/workers/(?<worker_id>[^/]+)/link/?$ {
            proxy_pass http://hubs_sticky;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else (HTTP API + any other WS like job event
        # streams) — round-robin. The Hub→Hub forwarding layer makes
        # this transparent: a /sessions/{id}/* request that lands on
        # a non-owner hub reverse-proxies to the owning hub.
        location / {
            proxy_pass http://hubs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
