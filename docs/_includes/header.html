<script>
// Mobile (or no-hover) dropdowns: tap once to open, second tap follows the link.
// Hover-only dropdowns broke touch users — tapping "はじめに ▾" jumped straight
// to why-paprika.html and they never saw the submenu.
(function(){
  var mq = window.matchMedia('(hover: none), (max-width: 800px)');
  function bind(){
    document.querySelectorAll('.topnav .dropdown').forEach(function(d){
      var toggle = d.querySelector('.dropdown-toggle');
      if (!toggle || toggle.dataset.tapBound) return;
      toggle.dataset.tapBound = '1';
      toggle.addEventListener('click', function(e){
        if (!mq.matches) return;          // desktop: hover still works
        if (!d.classList.contains('open')) {
          e.preventDefault();
          document.querySelectorAll('.topnav .dropdown.open').forEach(function(o){
            if (o !== d) o.classList.remove('open');
          });
          d.classList.add('open');
        }
        // second tap (already open) → fall through to navigate
      });
    });
  }
  document.addEventListener('click', function(e){
    if (!e.target.closest('.topnav .dropdown')) {
      document.querySelectorAll('.topnav .dropdown.open').forEach(function(d){ d.classList.remove('open'); });
    }
  });
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind);
  else bind();
})();

// === Theme toggle (light / dark) ===
// Early apply runs in <head> via favicon.html to avoid FOUC. Here we expose
// the toggle function so the button can flip the state at click time.
window.__paprikaToggleTheme = function(){
  try {
    var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    if (next === 'dark') document.documentElement.dataset.theme = 'dark';
    else delete document.documentElement.dataset.theme;
    localStorage.setItem('paprika.theme', next);
  } catch(_){}
};

// === Copy button on every <pre> code block ===
(function(){
  function addCopy(pre){
    if (pre.dataset.copyAdded) return;
    pre.dataset.copyAdded = '1';
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'コードをコピー');
    btn.title = 'コピー';
    btn.innerHTML = '<iconify-icon icon="lucide:copy"></iconify-icon>';
    btn.addEventListener('click', async function(){
      var code = pre.querySelector('code') || pre;
      var text = (code.innerText || code.textContent || '').replace(/\u00a0/g, ' ');
      try {
        await navigator.clipboard.writeText(text);
        btn.classList.add('copied');
        btn.innerHTML = '<iconify-icon icon="lucide:check"></iconify-icon>';
        setTimeout(function(){
          btn.classList.remove('copied');
          btn.innerHTML = '<iconify-icon icon="lucide:copy"></iconify-icon>';
        }, 1500);
      } catch(e) {
        // Fallback: select+execCommand for older browsers
        var range = document.createRange(); range.selectNodeContents(code);
        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        try { document.execCommand('copy'); btn.classList.add('copied'); } catch(_){}
        sel.removeAllRanges();
      }
    });
    pre.appendChild(btn);
  }
  function init(){ document.querySelectorAll('pre').forEach(addCopy); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

// === Cmd+K / Ctrl+K command palette (inline search modal) ===
(function(){
  var modal = null, lunrIdx = null, searchDocs = null, loaded = false, loading = null;
  var BASE = '{{ "/" | relative_url }}'.replace(/\/$/, '');
  function buildModal(){
    modal = document.createElement('div');
    modal.className = 'cmdk-modal';
    modal.innerHTML = '<div class="cmdk-panel" role="dialog" aria-label="サイト内検索">' +
      '<input type="search" placeholder="検索...　(↑↓ で選択, Enter で開く, Esc で閉じる)" autocomplete="off" autocapitalize="off">' +
      '<div class="cmdk-results"></div>' +
      '<div class="cmdk-hint"><kbd>↑</kbd> <kbd>↓</kbd> 選択　<kbd>Enter</kbd> 開く　<kbd>Esc</kbd> 閉じる</div>' +
    '</div>';
    modal.addEventListener('click', function(e){ if (e.target === modal) close(); });
    var input = modal.querySelector('input');
    input.addEventListener('input', function(){ render(input.value); });
    input.addEventListener('keydown', handleKey);
    document.body.appendChild(modal);
  }
  function open(){
    if (!modal) buildModal();
    modal.style.display = 'flex';
    var input = modal.querySelector('input');
    setTimeout(function(){ input.focus(); }, 30);
    ensureIndex();
  }
  function close(){ if (modal) modal.style.display = 'none'; }
  async function ensureIndex(){
    if (loaded) return; if (loading) return loading;
    loading = (async function(){
      if (!window.lunr) {
        await new Promise(function(res, rej){
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/lunr@2.3.9/lunr.min.js';
          s.onload = res; s.onerror = rej; document.head.appendChild(s);
        });
      }
      var res = await fetch(BASE + '/search.json');
      var text = await res.text();
      // Be lenient with non-strict JSON the build might emit (newlines in content):
      try { searchDocs = JSON.parse(text); }
      catch(e){ searchDocs = parseLenient(text) || []; }
      lunrIdx = lunr(function(){
        this.ref('url');
        this.field('title', { boost: 10 });
        this.field('description', { boost: 5 });
        this.field('content');
        searchDocs.forEach(function(d){ try { this.add(d); } catch(_){} }, this);
      });
      loaded = true;
    })();
    return loading;
  }
  function parseLenient(text){
    // Strip control chars then retry
    try { return JSON.parse(text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]+/g, ' ')); }
    catch(_){ return null; }
  }
  function render(q){
    var out = modal.querySelector('.cmdk-results');
    out.innerHTML = '';
    if (!loaded) { out.innerHTML = '<p class="cmdk-noresults">読み込み中…</p>'; return; }
    if (!q || q.trim().length < 1) return;
    var qTrim = q.trim();
    var hits = [];
    try { hits = lunrIdx.search(qTrim + '*').slice(0, 10); } catch(_){}
    if (!hits.length) { out.innerHTML = '<p class="cmdk-noresults">該当なし</p>'; return; }
    hits.forEach(function(hit, i){
      var doc = searchDocs.find(function(d){ return d.url === hit.ref; });
      if (!doc) return;
      var a = document.createElement('a');
      a.href = BASE + doc.url.replace(/^\/paprika/, '');
      a.className = 'cmdk-result' + (i === 0 ? ' selected' : '');
      a.innerHTML = '<div class="cmdk-title"></div><div class="cmdk-desc"></div>';
      a.querySelector('.cmdk-title').textContent = doc.title;
      // Build a snippet: prefer content match, fall back to description
      var snip = buildSnippet(doc.content || '', qTrim) || (doc.description || '').slice(0, 110);
      var descEl = a.querySelector('.cmdk-desc');
      // Highlight matched terms with <mark>
      var safe = snip.replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; });
      try {
        var re = new RegExp('(' + qTrim.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
        safe = safe.replace(re, '<mark>$1</mark>');
      } catch(_){}
      descEl.innerHTML = safe;
      out.appendChild(a);
    });
  }
  function buildSnippet(content, q){
    if (!content || !q) return null;
    var idx = content.toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return null;
    var start = Math.max(0, idx - 40);
    var end = Math.min(content.length, idx + q.length + 70);
    var pre = start > 0 ? '… ' : '';
    var post = end < content.length ? ' …' : '';
    return pre + content.slice(start, end) + post;
  }
  function handleKey(e){
    if (e.key === 'Escape') { close(); return; }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      var items = modal.querySelectorAll('.cmdk-result');
      if (!items.length) return;
      var cur = modal.querySelector('.cmdk-result.selected');
      var idx = cur ? Array.prototype.indexOf.call(items, cur) : -1;
      idx += (e.key === 'ArrowDown' ? 1 : -1);
      idx = (idx + items.length) % items.length;
      if (cur) cur.classList.remove('selected');
      items[idx].classList.add('selected');
      items[idx].scrollIntoView({ block: 'nearest' });
    }
    if (e.key === 'Enter') {
      var cur = modal.querySelector('.cmdk-result.selected');
      if (cur) window.location.href = cur.href;
    }
  }
  document.addEventListener('keydown', function(e){
    var typed = e.key && e.key.toLowerCase() === 'k';
    if ((e.metaKey || e.ctrlKey) && typed) { e.preventDefault(); open(); }
    if (e.key === '/' && !/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) {
      e.preventDefault(); open();
    }
  });
})();
</script>
